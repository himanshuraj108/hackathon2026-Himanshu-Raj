services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - PORT=4000
      - MAX_CONCURRENCY=5
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/audit_log.json:/app/audit_log.json
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:4000
    restart: unless-stopped
